name = "flight-strategy-ai"
main = "worker.js"
compatibility_date = "2026-07-18"

# KV namespace binding — the "id" below is a placeholder.
# Create the real namespace first (Step 2 below) and paste its id here.
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Workers AI binding (optional — remove this block if you don't want it yet)
[ai]
binding = "AI"

# Non-secret variable
[vars]
AMADEUS_ENV = "test"

# Secrets (AMADEUS_CLIENT_ID / AMADEUS_CLIENT_SECRET) are NOT put in this file.
# Set them as encrypted environment variables in the dashboard — see README Step 4.
