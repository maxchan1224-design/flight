name = "flight-deal-intel"
main = "intel-worker.js"
compatibility_date = "2026-07-18"

# ---- Nightly scan: 19:00 UTC = 03:00 Hong Kong time ----
[triggers]
crons = ["0 19 * * *"]

# ---- KV: response/token cache (short-lived) ----
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_CACHE_NAMESPACE_ID"

# ---- KV: price history + watchlist + ingested mail (long-lived, keep separate) ----
[[kv_namespaces]]
binding = "HISTORY"
id = "REPLACE_WITH_HISTORY_NAMESPACE_ID"

# ---- Workers AI (optional; delete this block to run rules-only) ----
[ai]
binding = "AI"

[vars]
AMADEUS_ENV = "test"

# Secrets — set in the dashboard, NOT here:
#   AMADEUS_CLIENT_ID
#   AMADEUS_CLIENT_SECRET
#   INGEST_TOKEN          (any long random string, for /api/ingest)
